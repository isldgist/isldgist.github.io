intro: |
  ISL Lab과 함께 연구할 열정 있는 학생을 기다립니다.
  Physical AI 및 멀티모달 학습 연구에 관심 있는 분이라면, 아래 과정별 안내를 충분히 읽어보신 후 하단의 Apply 버튼을 통해 지원해 주시기 바랍니다.

buttons:
  - label: "Apply 🚀"
    url: "https://docs.google.com/forms/d/e/1FAIpQLScYQf-lwtDU-QAPXjflb9WH-COt_b2Xl5a8rkQEoPiPzWjOdA/viewform?usp=header"
    variant: "primary"
    new_tab: true

tracks:
  - title: "학부인턴 (DGIST 공식 프로그램)"
    badge: "공식 지원기간 운영"
    content: |
      DGIST 공식 학부인턴 프로그램으로, TO 제한과 기간 제약이 있습니다.
      짧은 기간을 최대한 활용하기 위해, 인턴십 전후로 학부연구생 기간을 연계하여 참여할 학생을 우선 선발합니다.
      DGIST 공식 지원기간 시작 1주일 전까지 상단의 Apply 버튼을 통해 먼저 지원하여 인터뷰를 거쳐 선발합니다.

  - title: "학부연구생"
    badge: "상시 모집 · 인터뷰 상시"
    content: |
      연구와 논문 작업 프로세스를 직접 경험해보는것을 목표로 합니다.
      연구실에서 진행 중인 프로젝트에 참여하거나, 학생이 주도적으로 아이디어 발굴부터 시작하는 방식 모두 가능합니다.
      어떤 방식이든 논문 서베이, 실험 설계, 논문 작성 및 제출까지 연구자로서의 전체 프로세스를 경험하고, 최종적으로 탑티어 AI 학회에 논문 제출을 목표로 합니다.
      연구에 깊이 몰입할 수 있는 학부 3학년 이상 학생을 모집하며, 참여 시작 시기는 유연하게 조율 가능합니다.

  - title: "Post Doc"
    badge: "이노코어 프로그램 선발 중"
    content: |
      현재 이노코어(InnoCORE) 프로그램을 통해 Post Doc 연구원을 선발하고 있습니다.
      AI, Computer Vision, NLP, Robotics 분야 top-tier 학회 또는 저널에 주저자 논문 2편 이상인 분을 모집합니다.

  - title: "대학원생 (석·박사·통합과정)"
    badge: "EECS · AI 학제전공 선발 중"
    content: |
      석사, 박사, 통합과정 모두 모집합니다. 대학원 입학 전 최소 한 학기 이상 학부연구생으로 먼저 참여하는 것을 적극 권장하며, 실제 연구를 함께 경험하며 서로의 연구 방향과 스타일을 충분히 파악한 후 진학하고자 함입니다.

      ### 이런 분을 찾습니다
      - AI 연구에서 실질적인 성과를 내고자 하는 뚜렷한 동기를 가진 분
      - 높은 기준을 유지하면서도 결과물을 만들어내는 분
      - 연구실 상주 및 풀타임 참여가 가능한 분

      ### 연구실 문화
      - 연구 외 불필요한 업무를 최소화하고, 연구 자체에 집중할 수 있는 환경을 지향합니다
      - 모든 구성원은 각자의 프로젝트를 가지며, 매년 주저자로 최소 한 편 이상의 top-tier AI 학회 논문 제출을 기대합니다
      - 매주 1:1 미팅을 통해 밀도 있는 피드백을 주고받습니다
      - 구성원 간 자유로운 토론과 협업을 장려하며, 외부 연구기관과의 협업도 적극 지원합니다

      ### 졸업 시점에, 다음과 같은 성과를 기대합니다
      - 매년 1+ top-tier AI 학회 논문 발표 
      - 발표 및 커뮤니케이션 역량
      - 후배 연구원 멘토링 경험
      - 국내외 유수 연구기관 인턴십 경험
